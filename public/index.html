<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local-Llama</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="topbar-brand">
          <h1>Local-Llama</h1>
          <small>
            by Julien Regnault |
            <a href="https://github.com/Philipid3s" target="_blank" rel="noreferrer noopener">
              github.com/Philipid3s
            </a>
          </small>
        </div>
        <div class="controls">
          <label for="model">Model</label>
          <select id="model" name="model"></select>
        </div>
      </header>

      <div class="workspace">
        <aside class="threads-panel">
          <div class="threads-header">
            <h2>Chats</h2>
            <button id="new-chat-btn" type="button">New</button>
          </div>
          <div id="threads-list" class="threads-list" aria-live="polite"></div>
        </aside>

        <section class="chat-pane">
          <section id="messages" class="messages" aria-live="polite"></section>

          <form id="chat-form" class="composer">
            <div id="attached-files" class="attached-files" aria-live="polite"></div>
            <div class="composer-row">
              <div class="composer-tools">
                <button
                  id="web-search-btn"
                  class="icon-btn tool-icon-btn"
                  type="button"
                  aria-label="Toggle Web Search"
                  aria-pressed="false"
                  title="Web Search"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 0c2.5 2.7 3.8 6.3 3.8 10S14.5 19.3 12 22m0-20C9.5 4.7 8.2 8.3 8.2 12S9.5 19.3 12 22m-9-10h18M4.5 7h15m-15 10h15"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.8"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </button>
                <button id="attach-btn" class="icon-btn" type="button" aria-label="Attach PDF">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      d="M8 12.5v5a4 4 0 0 0 8 0v-9a3 3 0 0 0-6 0v8a2 2 0 0 0 4 0V10"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </button>
              </div>
              <input id="pdf-file" name="pdf-file" type="file" accept="application/pdf,.pdf" hidden />
              <textarea
                id="prompt"
                name="prompt"
                rows="3"
                placeholder="Type your message..."
                required
              ></textarea>
              <button id="send-btn" type="submit">Send</button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
